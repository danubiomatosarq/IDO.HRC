<script>
App.renderVariance=function(el){var data=this.data,self=this;
if(!data||!data.length){el.innerHTML='<div class="p-10 text-center text-gray-400">Sem dados para exibir.</div>';return;}
var sg=el.dataset.vgroup||'TODOS';var groups=['TODOS'];var gs={};
data.forEach(function(d){if(!gs[d.grupo]){gs[d.grupo]=1;groups.push(d.grupo);}});
var fd=sg==='TODOS'?data:data.filter(function(d){return d.grupo===sg;});
var tP=0,tE=0;fd.forEach(function(d){tP+=d.current.plan;tE+=d.current.exec;});
fd.sort(function(a,b){return Math.abs(b.current.diff)-Math.abs(a.current.diff);});
var gO='';groups.forEach(function(g){gO+='<option value="'+g+'"'+(g===sg?' selected':'')+'>'+g+'</option>';});
var h='<div class="space-y-6">';
// Header
h+='<div class="bg-white rounded-lg p-4 shadow-sm border border-gray-200 flex flex-col sm:flex-row sm:items-center justify-between gap-4 relative overflow-hidden animate-fade-in-up"><div class="absolute left-0 top-0 h-full w-2 bg-orange-500"></div>';
h+='<h2 class="text-xl font-bold text-gray-800 ml-2 uppercase tracking-tight">Painel Tático - Análise de Variância</h2>';
h+='<div class="flex items-center gap-2"><span class="font-bold text-gray-600 text-sm">Filtro de Grupo:</span><select onchange="App.vFilter(this.value)" class="bg-gray-50 border border-gray-300 text-gray-700 text-sm rounded-lg focus:ring-brand-primary focus:border-brand-primary block p-2 min-w-[200px]">'+gO+'</select></div></div>';
// KPIs
h+='<div class="grid grid-cols-1 md:grid-cols-3 gap-6">';
h+='<div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200 flex items-center justify-between"><div><p class="text-gray-400 text-xs font-bold uppercase">Total Planejado (Grupo)</p><p class="text-2xl font-extrabold text-gray-700 mt-1">'+self.fmtBRL(tP)+'</p></div></div>';
h+='<div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200 flex items-center justify-between"><div><p class="text-gray-400 text-xs font-bold uppercase">Total Executado (Grupo)</p><p class="text-2xl font-extrabold text-blue-600 mt-1">'+self.fmtBRL(tE)+'</p></div></div>';
h+='<div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200 flex items-center justify-between"><div><p class="text-gray-400 text-xs font-bold uppercase">Contas Registradas</p><p class="text-2xl font-extrabold text-indigo-600 mt-1">'+fd.length+'</p></div><div class="h-10 w-10 bg-indigo-50 rounded-full flex items-center justify-center text-indigo-500 font-bold">#</div></div>';
h+='</div>';
// Charts
h+='<div class="grid grid-cols-1 lg:grid-cols-2 gap-6 min-h-[450px]">';
h+='<div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 flex flex-col"><h3 class="text-sm font-bold text-gray-600 uppercase mb-4 flex items-center gap-2">Variações (Todas as Contas)</h3><div class="flex-1 min-h-0"><canvas id="chart-bar-v"></canvas></div></div>';
h+='<div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 flex flex-col"><h3 class="text-sm font-bold text-gray-600 uppercase mb-4 pl-2 border-l-4 border-orange-500">Evolução da Execução (Grupo Selecionado)</h3><div class="flex-1 min-h-0"><canvas id="chart-line-v"></canvas></div></div>';
h+='</div>';
// Table
h+='<div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden"><div class="p-4 bg-gray-50 border-b border-gray-200"><h3 class="text-sm font-bold text-gray-700 uppercase">Detalhamento Analítico</h3></div>';
h+='<div class="overflow-x-auto"><table class="w-full text-sm text-left"><thead class="bg-gray-100 text-gray-600 font-semibold uppercase text-xs"><tr><th class="px-6 py-3">Conta / Subgrupo</th><th class="px-6 py-3">Grupo</th><th class="px-6 py-3 text-right">Planejado</th><th class="px-6 py-3 text-right">Executado</th><th class="px-6 py-3 text-center">Dif (R$)</th><th class="px-6 py-3 text-center">Var (%)</th><th class="px-6 py-3 text-center">Status</th></tr></thead>';
h+='<tbody class="divide-y divide-gray-100">';
fd.forEach(function(r){var vp=r.current.varPct,st='DENTRO DO ESPERADO';
if(vp>0.20)st='CRÍTICA';else if(vp>0.10)st='EM ATENÇÃO';else if(vp<=-0.40)st='SUBEXECUTADO';
var bc='bg-emerald-100 text-emerald-700';if(st==='CRÍTICA')bc='bg-red-100 text-red-700';else if(st==='EM ATENÇÃO')bc='bg-amber-100 text-amber-700';else if(st==='SUBEXECUTADO')bc='bg-blue-100 text-blue-700';
var vpc='bg-gray-100 text-gray-600';if(vp>0.15)vpc='bg-red-100 text-red-700';else if(vp<-0.15)vpc='bg-blue-100 text-blue-700';
h+='<tr class="hover:bg-gray-50"><td class="px-6 py-3 font-medium text-gray-800">'+r.conta+'</td><td class="px-6 py-3 text-xs text-gray-500">'+r.grupo+'</td>';
h+='<td class="px-6 py-3 text-right text-gray-500">'+self.fmtBRL(r.current.plan)+'</td><td class="px-6 py-3 text-right text-gray-800 font-bold">'+self.fmtBRL(r.current.exec)+'</td>';
h+='<td class="px-6 py-3 text-right font-medium '+(r.current.diff>0?'text-red-600':'text-green-600')+'">'+self.fmtBRL(r.current.diff)+'</td>';
h+='<td class="px-6 py-3 text-right"><span class="px-2 py-1 rounded text-xs font-bold '+vpc+'">'+self.fmtPct(vp)+'</span></td>';
h+='<td class="px-6 py-3 text-center"><span class="inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-full text-[10px] font-bold uppercase whitespace-nowrap '+bc+'">'+st+'</span></td></tr>';});
h+='</tbody></table></div></div></div>';
el.innerHTML=h;
// Charts
self.destroyChart('bv');self.destroyChart('lv');
var cd=fd.map(function(i){return{name:i.conta,val:i.current.diff};}).sort(function(a,b){return Math.abs(b.val)-Math.abs(a.val);}).slice(0,15);
self.charts.bv=new Chart(document.getElementById('chart-bar-v'),{type:'bar',data:{labels:cd.map(function(c){return c.name.length>25?c.name.substring(0,25)+'…':c.name;}),datasets:[{label:'Variação R$',data:cd.map(function(c){return c.val;}),backgroundColor:cd.map(function(c){return c.val>0?'#ef4444':'#22c55e';}),borderRadius:4,maxBarThickness:15}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{display:false},y:{ticks:{font:{size:10}}}}}});
var mt={};fd.forEach(function(it){if(!it.historico)return;it.historico.forEach(function(hh){if(!mt[hh.mes])mt[hh.mes]={mes:hh.mes,plan:0,exec:0,cnt:0};mt[hh.mes].plan+=hh.plan||0;mt[hh.mes].exec+=hh.exec||0;if(hh.exec>0)mt[hh.mes].cnt++;});});
var sm=Object.keys(mt).sort(),aP=0,aE=0,ll=[],pD=[],eD=[];
sm.forEach(function(m){var t=mt[m];aP+=t.plan;var iF=t.exec===0&&t.cnt===0;if(!iF)aE+=t.exec;ll.push(new Date(m+'-01T12:00:00').toLocaleDateString('pt-BR',{month:'short'}));pD.push(aP);eD.push(iF?null:aE);});
self.charts.lv=new Chart(document.getElementById('chart-line-v'),{type:'line',data:{labels:ll,datasets:[{label:'Realizado',data:eD,borderColor:'#0e7490',borderWidth:3,pointRadius:4,tension:.3},{label:'Planejado',data:pD,borderColor:'#94a3b8',borderWidth:2,borderDash:[5,5],pointRadius:0,tension:.1}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:12},padding:10}}},scales:{x:{ticks:{font:{size:10}}},y:{ticks:{callback:function(v){return'R$'+(v/1000)+'k';},font:{size:10}},grid:{color:'#e5e7eb'}}}}});
};
App.vFilter=function(v){var el=document.getElementById('tab-content');if(el){el.dataset.vgroup=v;this.renderVariance(el);}};
</script>
